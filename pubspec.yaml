name: paper_pilot_pdf
description: "PaperPilot PDF - Scan documents and save them as PDF files."
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  flutter_doc_scanner: ^0.0.20
  google_mobile_ads: ^6.0.0
  intl: ^0.20.2
  open_filex: ^4.7.0
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/paper_pilot_pdf_app_icon_1024.png"
  remove_alpha_ios: true
  min_sdk_android: 21
